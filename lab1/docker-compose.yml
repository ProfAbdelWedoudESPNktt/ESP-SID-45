services:
  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9094:9094"  # External access from host
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    networks:
      - bigdata-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    command: >
      bash -c "
      # Format storage if not already formatted
      if [ ! -f /tmp/kraft-combined-logs/meta.properties ]; then
        kafka-storage format -t MkU3OEVBNTcwNTJENDM2Qk -c /etc/kafka/docker/server.properties
      fi
      # Start Kafka
      /etc/confluent/docker/run
      "

  # Kafka UI for monitoring
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka
    networks:
      - bigdata-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Spark Master
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: lab1-spark:latest
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8081:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master port
      - "4040:4040"  # Spark Application UI
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_WEBUI_PORT: 8080
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - spark-logs:/opt/spark/logs
    networks:
      - bigdata-network
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Spark Worker 1
  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: lab1-spark:latest
    container_name: spark-worker-1
    hostname: spark-worker-1
    environment:
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - spark-logs:/opt/spark/logs
    depends_on:
      - spark-master
    networks:
      - bigdata-network
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://spark-master:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Jupyter Lab with PySpark
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    image: lab1-jupyter:latest
    container_name: jupyter
    hostname: jupyter
    ports:
      - "8888:8888"  # Jupyter Lab
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "bigdata2026"
      SPARK_MASTER: "spark://spark-master:7077"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      PYTHONUNBUFFERED: "1"
      PYSPARK_PYTHON: "/opt/conda/bin/python"
      PYSPARK_DRIVER_PYTHON: "/opt/conda/bin/python"
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - ./notebooks:/home/myname/work
      - jupyter-home:/home/myname
    depends_on:
      - spark-master
      - kafka
    networks:
      - bigdata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: >
      bash -c "
      start-notebook.sh --NotebookApp.token='bigdata2026' --NotebookApp.password=''
      "

networks:
  bigdata-network:
    driver: bridge
    name: bigdata-network

volumes:
  kafka-data:
    driver: local
  spark-logs:
    driver: local
  jupyter-home:
    driver: local
